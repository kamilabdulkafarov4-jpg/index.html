<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AR Детектор</title>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700;900&family=Rajdhani:wght@600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    overflow: hidden;
    font-family: 'Rajdhani', sans-serif;
    touch-action: none;
    user-select: none;
  }

  #container {
    position: relative;
    width: 100vw;
    height: 100vh;
  }

  video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: none;
  }

  /* Vignette overlay */
  #vignette {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center,
      transparent 55%,
      rgba(0,0,0,0.5) 100%);
    pointer-events: none;
    z-index: 5;
  }

  /* Scanline effect */
  #scanlines {
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.04) 2px,
      rgba(0,0,0,0.04) 4px
    );
    pointer-events: none;
    z-index: 6;
    animation: scanMove 8s linear infinite;
  }

  @keyframes scanMove {
    0% { background-position: 0 0; }
    100% { background-position: 0 100px; }
  }

  #overlay { position: fixed; inset: 0; z-index: 10; pointer-events: none; }

  /* ── Bounding box ── */
  .box {
    position: absolute;
    border: 2px solid transparent;
    border-radius: 8px;
    pointer-events: none;
    will-change: transform, opacity;
    transition: left 0.35s ease, top 0.35s ease,
                width 0.35s ease, height 0.35s ease;
  }

  /* Animated corner brackets */
  .box::before, .box::after {
    content: '';
    position: absolute;
    width: 16px; height: 16px;
    border-color: inherit;
    border-style: solid;
    transition: all 0.3s ease;
  }
  .box::before {
    top: -2px; left: -2px;
    border-width: 3px 0 0 3px;
    border-top-left-radius: 6px;
  }
  .box::after {
    bottom: -2px; right: -2px;
    border-width: 0 3px 3px 0;
    border-bottom-right-radius: 6px;
  }

  /* Corner brackets via pseudo-elements on inner spans */
  .box .corner-tr,
  .box .corner-bl {
    position: absolute;
    width: 16px; height: 16px;
    border-style: solid;
    border-color: inherit;
    pointer-events: none;
  }
  .box .corner-tr {
    top: -2px; right: -2px;
    border-width: 3px 3px 0 0;
    border-top-right-radius: 6px;
  }
  .box .corner-bl {
    bottom: -2px; left: -2px;
    border-width: 0 0 3px 3px;
    border-bottom-left-radius: 6px;
  }

  /* Appear animation */
  @keyframes boxAppear {
    0%   { opacity: 0; transform: scale(0.7); }
    60%  { opacity: 1; transform: scale(1.04); }
    100% { opacity: 1; transform: scale(1); }
  }
  @keyframes boxDisappear {
    0%   { opacity: 1; transform: scale(1); }
    100% { opacity: 0; transform: scale(0.75); }
  }

  .box.entering { animation: boxAppear 0.35s cubic-bezier(0.34,1.56,0.64,1) forwards; }
  .box.leaving  { animation: boxDisappear 0.25s ease-in forwards; }

  /* Confidence pulse ring */
  .box .pulse-ring {
    position: absolute;
    inset: -8px;
    border-radius: 12px;
    border: 1px solid;
    border-color: inherit;
    opacity: 0;
    animation: pulseRing 2s ease-out infinite;
  }
  @keyframes pulseRing {
    0%   { inset: -4px; opacity: 0.6; }
    100% { inset: -20px; opacity: 0; }
  }

  /* Label */
  .label {
    position: absolute;
    top: -36px; left: -2px;
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
    animation: labelSlide 0.35s cubic-bezier(0.34,1.56,0.64,1) forwards;
  }
  @keyframes labelSlide {
    0%   { opacity: 0; transform: translateY(8px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  .label-text {
    background: var(--color);
    color: #000;
    padding: 4px 10px 3px;
    font-size: 12px;
    font-weight: 700;
    border-radius: 5px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    box-shadow: 0 0 12px var(--color), 0 2px 8px rgba(0,0,0,0.4);
  }

  .label-conf {
    background: rgba(0,0,0,0.7);
    color: var(--color);
    padding: 3px 7px;
    font-size: 10px;
    font-weight: 600;
    border-radius: 4px;
    border: 1px solid var(--color);
    letter-spacing: 0.05em;
  }

  /* Emoji badge */
  .label-emoji {
    font-size: 16px;
    filter: drop-shadow(0 0 4px rgba(255,255,255,0.3));
  }

  /* Fill tint */
  .box-fill {
    position: absolute;
    inset: 0;
    border-radius: 6px;
    background: var(--fill);
    pointer-events: none;
    animation: fillPulse 3s ease-in-out infinite;
  }
  @keyframes fillPulse {
    0%, 100% { opacity: 0.06; }
    50%       { opacity: 0.14; }
  }

  /* ── HUD ── */
  #hud {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 20;
    pointer-events: none;
    padding: 16px 20px 10px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
  }

  #hud-left {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  #title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px;
    font-weight: 900;
    color: #fff;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    opacity: 0.9;
    text-shadow: 0 0 20px rgba(0,255,200,0.4);
  }

  #status {
    font-size: 10px;
    font-weight: 600;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  #status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #ff4444;
    animation: blink 1s ease infinite;
  }
  #status-dot.active {
    background: #00ff88;
    animation: blink 2s ease infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.2; }
  }

  #hud-right {
    text-align: right;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  #count-display {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 32px;
    font-weight: 900;
    color: #fff;
    line-height: 1;
    text-shadow: 0 0 30px rgba(0,255,200,0.5);
    transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  #count-display.bump {
    animation: countBump 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes countBump {
    0%   { transform: scale(1); }
    50%  { transform: scale(1.4); color: #00ff88; }
    100% { transform: scale(1); }
  }

  #count-label {
    font-size: 9px;
    font-weight: 700;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  /* FPS counter */
  #fps {
    position: fixed;
    bottom: 16px;
    right: 16px;
    z-index: 20;
    font-size: 10px;
    font-weight: 600;
    color: rgba(255,255,255,0.3);
    letter-spacing: 0.1em;
    pointer-events: none;
  }

  /* Recent detections ticker */
  #ticker {
    position: fixed;
    bottom: 16px;
    left: 16px;
    z-index: 20;
    display: flex;
    flex-direction: column;
    gap: 4px;
    pointer-events: none;
    max-width: 160px;
  }

  .tick-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    font-weight: 700;
    color: rgba(255,255,255,0.7);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    animation: tickIn 0.3s ease forwards;
    background: rgba(0,0,0,0.4);
    padding: 4px 8px;
    border-radius: 4px;
    border-left: 2px solid var(--c, #00ff88);
  }
  @keyframes tickIn {
    0%   { opacity: 0; transform: translateX(-10px); }
    100% { opacity: 1; transform: translateX(0); }
  }

  /* Loading overlay */
  #loading {
    position: fixed;
    inset: 0;
    z-index: 100;
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    transition: opacity 0.8s ease;
  }
  #loading.hidden { opacity: 0; pointer-events: none; }

  .loader-ring {
    width: 60px; height: 60px;
    border: 3px solid rgba(0,255,136,0.2);
    border-top-color: #00ff88;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .loader-text {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.3em;
    text-transform: uppercase;
  }

  /* Flash effect on new detection */
  #flash {
    position: fixed;
    inset: 0;
    z-index: 15;
    pointer-events: none;
    background: rgba(0,255,136,0.08);
    opacity: 0;
  }
  #flash.flash-go {
    animation: flashAnim 0.4s ease forwards;
  }
  @keyframes flashAnim {
    0%   { opacity: 1; }
    100% { opacity: 0; }
  }
</style>
</head>
<body>

// ──────────────────────────────────────────────
//  COLOR FALLBACK
// ──────────────────────────────────────────────
const PALETTE = [
  '#00ff88','#00d4ff','#ff6b6b','#ffd700',
  '#ff8c42','#9b8fd4','#2ed573','#ff69b4'
];
function getEntry(cls) {
  const e = DICT[cls];
  if (e) return e;
  const color = PALETTE[Math.abs(hashStr(cls)) % PALETTE.length];
  return { ru: cls.toUpperCase(), emoji: '📦', color };
}
function hashStr(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) h = (Math.imul(31, h) + s.charCodeAt(i)) | 0;
  return h;
}

// ──────────────────────────────────────────────
//  DOM REFS
// ──────────────────────────────────────────────
const video    = document.getElementById('v');
const overlay  = document.getElementById('overlay');
const statusDot  = document.getElementById('status-dot');
const statusText = document.getElementById('status-text');
const countEl  = document.getElementById('count-display');
const tickerEl = document.getElementById('ticker');
const flashEl  = document.getElementById('flash');
const fpsEl    = document.getElementById('fps');
const loadingEl= document.getElementById('loading');

// ──────────────────────────────────────────────
//  STATE
// ──────────────────────────────────────────────
let model;
let registry = new Map();   // id → { el, lastSeen, cls }
let prevCount = 0;
let frameCount = 0;
let lastFpsTime = performance.now();
let seenClasses = new Set();

// ──────────────────────────────────────────────
//  CAMERA
// ──────────────────────────────────────────────
async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: { ideal: 'environment' },
        width: { ideal: 1280 },
        height: { ideal: 720 }
      }
    });
    video.srcObject = stream;
    return new Promise(res => { video.onloadedmetadata = () => res(); });
  } catch (e) {
    statusText.textContent = 'Нет доступа к камере';
    throw e;
  }
}

// ──────────────────────────────────────────────
//  MODEL LOAD
// ──────────────────────────────────────────────
async function init() {
  statusText.textContent = 'Загрузка…';
  await startCamera();
  model = await cocoSsd.load({ base: 'mobilenet_v2' });
  loadingEl.classList.add('hidden');
  statusDot.classList.add('active');
  statusText.textContent = 'Активен';
  detect();
}

// ──────────────────────────────────────────────
//  DETECTION LOOP
// ──────────────────────────────────────────────
async function detect() {
  // FPS
  frameCount++;
  const now = performance.now();
  if (now - lastFpsTime >= 1000) {
    fpsEl.textContent = frameCount + ' FPS';
    frameCount = 0;
    lastFpsTime = now;
  }

  if (model && video.readyState === 4 && video.videoWidth > 0) {
    let preds;
    try {
      preds = await model.detect(video, 12, 0.70);
    } catch(e) {
      requestAnimationFrame(detect);
      return;
    }

    // Filter huge false positives (floor / wall)
    const vArea = video.videoWidth * video.videoHeight;
    const filtered = preds.filter(p => {
      const area = (p.bbox[2] * p.bbox[3]) / vArea;
      return area > 0.002 && area < 0.90;
    });

    updateRegistry(filtered, now);
  }

  requestAnimationFrame(detect);
}

// ──────────────────────────────────────────────
//  REGISTRY UPDATE
// ──────────────────────────────────────────────
function updateRegistry(predictions, now) {
  const sw = video.offsetWidth  / video.videoWidth;
  const sh = video.offsetHeight / video.videoHeight;

  const active = new Set();

  predictions.forEach(p => {
    // Grid-based ID to distinguish nearby same-class objects
    const gridX = Math.round(p.bbox[0] / 60);
    const gridY = Math.round(p.bbox[1] / 60);
    const id = `${p.class}-${gridX}-${gridY}`;
    active.add(id);

    const entry  = getEntry(p.class);
    const conf   = Math.round(p.score * 100);
    const isNew  = !seenClasses.has(p.class);

    let data = registry.get(id);

    if (!data) {
      // Create element
      const el = document.createElement('div');
      el.className = 'box entering';
      el.style.setProperty('--color', entry.color);
      el.style.setProperty('--fill', entry.color);
      el.style.borderColor = entry.color;
      el.innerHTML = `
        <div class="box-fill"></div>
        <div class="pulse-ring"></div>
        <span class="corner-tr"></span>
        <span class="corner-bl"></span>
        <div class="label">
          <span class="label-emoji">${entry.emoji}</span>
          <span class="label-text" style="background:${entry.color}">${entry.ru}</span>
          <span class="label-conf" style="color:${entry.color};border-color:${entry.color}">${conf}%</span>
        </div>`;
      overlay.appendChild(el);
      data = { el, lastSeen: now, cls: p.class };
      registry.set(id, data);

      // Flash effect
      triggerFlash();

      // Ticker
      if (isNew) {
        seenClasses.add(p.class);
        addTick(entry, conf);
      }

      // Remove entering class after animation
      setTimeout(() => el.classList.remove('entering'), 400);
    } else {
      // Update confidence label
      const confEl = data.el.querySelector('.label-conf');
      if (confEl) confEl.textContent = conf + '%';
    }

    data.lastSeen = now;

    // Position
    data.el.style.left   = (p.bbox[0] * sw) + 'px';
    data.el.style.top    = (p.bbox[1] * sh) + 'px';
    data.el.style.width  = (p.bbox[2] * sw) + 'px';
    data.el.style.height = (p.bbox[3] * sh) + 'px';
  });

  // Remove stale boxes
  for (const [id, data] of registry) {
    if (!active.has(id) && now - data.lastSeen > 1500) {
      const el = data.el;
      el.classList.add('leaving');
      registry.delete(id);
      setTimeout(() => el.remove(), 300);
    }
  }

  // Update count
  const count = registry.size;
  if (count !== prevCount) {
    countEl.textContent = count;
    countEl.classList.remove('bump');
    void countEl.offsetWidth; // reflow
    countEl.classList.add('bump');
    prevCount = count;
  }
}

// ──────────────────────────────────────────────
//  EFFECTS
// ──────────────────────────────────────────────
function triggerFlash() {
  flashEl.classList.remove('flash-go');
  void flashEl.offsetWidth;
  flashEl.classList.add('flash-go');
}

const tickQueue = [];
function addTick(entry, conf) {
  if (tickQueue.length > 4) {
    const old = tickQueue.shift();
    old.remove();
  }
  const div = document.createElement('div');
  div.className = 'tick-item';
  div.style.setProperty('--c', entry.color);
  div.textContent = entry.emoji + ' ' + entry.ru;
  tickerEl.appendChild(div);
  tickQueue.push(div);
  setTimeout(() => {
    div.style.transition = 'opacity 0.5s';
    div.style.opacity = '0';
    setTimeout(() => {
      div.remove();
      const i = tickQueue.indexOf(div);
      if (i >= 0) tickQueue.splice(i, 1);
    }, 500);
  }, 3000);
}

// ──────────────────────────────────────────────
//  GO
// ──────────────────────────────────────────────
init().catch(console.error);
</script>
